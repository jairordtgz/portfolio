<section id="sugerencias" class="cv-section">
  <h2 class="section-title">Sugerencias para Mejorar el Currículum</h2>

  <form class="cv-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

    <!-- Nombre -->
    <div class="form-group">
      <label for="nombre">Nombre:</label>
      <input
        type="text"
        id="nombre"
        formControlName="nombre"
        placeholder="Tu nombre completo"
        [class.input-error]="nombreInvalid"
      />
      @if (nombreInvalid) {
        <small class="error-msg">El nombre es obligatorio (mínimo 3 caracteres).</small>
      }
    </div>

    <!-- Área de mejora -->
    <div class="form-group">
      <label for="areaMejora">Área de mejora:</label>
      <select id="areaMejora" formControlName="areaMejora" [class.input-error]="areaInvalid">
        <option value="" disabled>Seleccione un área</option>
        <option value="contenido">Contenido</option>
        <option value="diseño">Diseño</option>
        <option value="estructura">Estructura</option>
        <option value="usabilidad">Usabilidad</option>
      </select>
      @if (areaInvalid) {
        <small class="error-msg">Selecciona un área de mejora.</small>
      }
    </div>

    <!-- Tipo de sugerencia -->
    <fieldset class="form-fieldset">
      <legend>¿Qué tipo de sugerencia quieres dar?</legend>
      <div class="radio-group">
        <div class="radio-item">
          <input type="radio" id="tipo1" formControlName="tipoSugerencia" value="general" />
          <label for="tipo1">General</label>
        </div>
        <div class="radio-item">
          <input type="radio" id="tipo2" formControlName="tipoSugerencia" value="tecnica" />
          <label for="tipo2">Técnica</label>
        </div>
        <div class="radio-item">
          <input type="radio" id="tipo3" formControlName="tipoSugerencia" value="visual" />
          <label for="tipo3">Visual</label>
        </div>
      </div>
      @if (tipoInvalid) {
        <small class="error-msg">Selecciona un tipo de sugerencia.</small>
      }
    </fieldset>

    <!-- Habilidades (selección múltiple) -->
    <div class="form-group">
      <label for="habilidades">Habilidades que debería reforzar:</label>
      <select id="habilidades" formControlName="habilidades" multiple size="5">
        <option value="javascript">JavaScript</option>
        <option value="css">CSS</option>
        <option value="html">HTML</option>
        <option value="react">React</option>
        <option value="node">Node.js</option>
      </select>
    </div>

    <!-- Comentarios -->
    <div class="form-group">
      <label for="comentarios">Comentarios adicionales:</label>
      <textarea
        id="comentarios"
        formControlName="comentarios"
        rows="5"
        placeholder="Escribe tus sugerencias aquí..."
      ></textarea>
    </div>

    <button type="submit" class="btn-submit">Enviar sugerencia</button>
  </form>
</section>
